# =============================================================================
# nginx/pdf-tools-pro.conf
# Configuração Nginx para o PDF Tools Pro
# =============================================================================
# Instalação:
#   sudo cp nginx/pdf-tools-pro.conf /etc/nginx/sites-available/pdf-tools-pro
#   sudo ln -s /etc/nginx/sites-available/pdf-tools-pro /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Para HTTPS (após apontar o domínio e instalar certbot):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d seu-dominio.com
# =============================================================================

# ─── Rate limiting — proteção básica contra abuso ────────────────────────────
# Limita uploads a 10 requisições/minuto por IP
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/m;

# ─── Server Block HTTP (porta 80) ─────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;

    # ⚠️ Substitua pelo seu domínio ou deixe "_" para aceitar qualquer IP
    server_name _;
    # server_name pdftools.seudominio.com;

    # ── Tamanho máximo de upload ──────────────────────────────────────────────
    # 520 MB = um pouco acima do limite da app (500 MB) para evitar erro 413 no Nginx
    client_max_body_size 520m;

    # ── Timeouts para processamentos longos (PDFs grandes demoram) ────────────
    client_body_timeout   300s;   # tempo para enviar o body completo
    client_header_timeout 60s;
    proxy_read_timeout    300s;   # tempo esperando resposta do backend
    proxy_send_timeout    300s;   # tempo enviando dados pro cliente
    proxy_connect_timeout  10s;

    # ── Buffer de corpo para uploads grandes ──────────────────────────────────
    # Desabilitar buffering do body evita que Nginx tente armazenar 500 MB em RAM
    proxy_request_buffering off;
    proxy_buffering         off;

    # ── Compressão Gzip ────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # ── Headers de segurança ──────────────────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"            always;
    add_header X-Content-Type-Options  "nosniff"               always;
    add_header X-XSS-Protection        "1; mode=block"         always;
    add_header Referrer-Policy         "strict-origin"         always;

    # ── Proxy para o container Docker ─────────────────────────────────────────
    location / {
        # Rate limiting nos endpoints de upload (proteção anti-abuso)
        limit_req zone=upload_limit burst=20 nodelay;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Streaming de download (importante para FileResponse do FastAPI)
        proxy_max_temp_file_size 0;
    }

    # ── Health check sem rate limiting ────────────────────────────────────────
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/pdf-tools-access.log;
    error_log  /var/log/nginx/pdf-tools-error.log;
}

