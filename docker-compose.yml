# docker-compose.yml — Uso local para testar exatamente como rodará na nuvem
# Comando: docker compose up --build
# Acesse: http://localhost:8000

version: "3.9"

services:
  pdf-tools:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdf-tools-pro
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      PDF_TOOLS_DATA_DIR: "/tmp/pdf_tools"
      PYTHONUNBUFFERED: "1"
    # Volume para persistir uploads/outputs entre restarts (opcional, para dev)
    volumes:
      - pdf_data:/tmp/pdf_tools
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  pdf_data:
    driver: local
